name: Windows Desktop Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Web Application
        run: npm run build

      - name: Build Electron Main and Preload
        run: npm run electron:build

      - name: Compile Windows Installer & Portable Binary
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Portable ZIP Fallback
        shell: pwsh
        run: |
          if (Test-Path "dist-installer/win-unpacked") {
            Write-Host "Creating portable ZIP fallback from win-unpacked..."
            Compress-Archive -Path dist-installer/win-unpacked/* -DestinationPath dist-installer/TallyGen-Pro-Portable-1.0.0-x64.zip -Force
            Write-Host "Portable ZIP created successfully at dist-installer/TallyGen-Pro-Portable-1.0.0-x64.zip"
          } else {
            Write-Error "Error: win-unpacked directory does not exist! Cannot create portable ZIP."
            exit 1
          }

      - name: Verify Generated Artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path dist-installer -Recurse

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TallyGen-Pro-Desktop-Windows
          path: |
            dist-installer/TallyGen-Pro-Setup-1.0.0-x64.exe
            dist-installer/TallyGen-Pro-Portable-1.0.0-x64.zip
            dist-installer/win-unpacked/TallyGen Pro.exe
          if-no-files-found: error
